app = "sistema-analisis-canales"
primary_region = "mad"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[env]
  PORT = "8080"
  FLASK_APP = "main.py"

[processes]
  app = "python main.py"
